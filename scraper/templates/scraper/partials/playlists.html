{% if spotify_token %}
<div class="mt-4 p-4 bg-white rounded-lg border border-gray-200 shadow-sm">
    <label for="playlist-select" class="block text-sm font-medium text-gray-700 mb-2">
        Select a Destination Playlist
    </label>
    <select id="playlist-select" name="playlist_id"
        class="block w-full rounded-md border-gray-300 shadow-sm focus:border-spotify focus:ring-spotify sm:text-sm">
        <option value="">-- Choose a Playlist --</option>
        {% for playlist in playlists %}
        <option value="{{ playlist.id }}">{{ playlist.name }}</option>
        {% endfor %}
    </select>

    <button
        class="mt-3 w-full bg-[#1DB954] text-white font-bold py-2 px-4 rounded-full hover:bg-opacity-90 transition-all text-sm">
        Add Scraped Tracks to Playlist
    </button>
</div>
{% else %}
<div
    class="mt-4 p-4 bg-gray-50 rounded-lg border border-dashed border-gray-300 text-center text-gray-500 italic text-sm">
    Connect to Spotify above to select a destination playlist.
</div>
{% endif %}
