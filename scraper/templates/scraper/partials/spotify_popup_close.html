<!DOCTYPE html>
<html>

<head>
    <title>Connecting...</title>
</head>

<body>
    <script>
        // 1. Attempt direct communication
        if (window.opener) {
            window.opener.postMessage('spotify_auth_success', '*');
        }

        // 2. Set storage flag for cross-origin/disowned popups
        localStorage.setItem('spotify_auth_status', 'success_' + Date.now());

        // 3. Close window (brief delay ensures storage/message events fire)
        setTimeout(() => { window.close(); }, 100);
    </script>
</body>

</html>
